    <h1>
      Choose Your Success Path
    </h1>
    <div id="selector"></div>
    <div class="overlay"></div>
    <div class="progressWrap">
      <div class="progressBar" id="bar"></div>
    </div>

    <div class="percent" id="percent">
      0%
    </div>
    <div id="roadmap"></div>

    <script>
      const paths = {
        "CODING CAREER (SOFTWARE-ENGINEER)":[

          "CHOOSE A LANGUAGE THAT FEELS EASY/COMFORTABLE TO YOU.(JAVASCRIPT IS RECOMMENDED BECAUSE THIS WEBSITE IS ALSO MADE WITH JAVASCRIPT)",
          "CHOOSE A MAIN LANGUAGE. UNDERSTAND IT PERFECTLY.",
          "PRACTICE CODING DAILY OR YOU WILL FORGET EVERYTHING. BY PRACTICING IT... YOU WILL UNDERSTAND PROBLEMS BY YOUR OWN.",
          "BUILD YOUR FIRST SMALL PROJECT AND SHOW TO OTHERS THEN TAKE FEEDBACK. YOUR WEBSITE MUST BE WELL DESIGNED, NO MATTER IT'S JUST A PAGE OR NOT.",
          "LEARN HTML AND CSS. THESE ARE FOR MAKING STRUCTURE OF YOUR WEBSITE AND DESIGNING IT",
          "UNDERSTAND GIT. STOP MANUAL DEPLOY AND START TO DO DEPLOYING BY GIT AND DO WORKS WITH GIT",
          "BUILD SMALL PROJECTS AND RESEARCH BIG WEBSITES, USE DEVELOPERS TOOL AND SEE HOW REAL WEBSITES ARE MADE",
          "LEARN FRAMEWORKS. IT IS FOR MAKING YOUR WEBSITE BOTH WELL ANIMATED AND INTERACTIVE",
          "COLLABORATE WITH OHTER DEVELOPERS AND LEARN MORE!"
        ],
        "ENTREPRENEURSHIP":[
          "UNDERSTAND BUSINESS BASICS.",
          "FIND A REAL PROBLEM",
          "STUDY YOUR MARKET",
          "CREATE A SIMPLE IDEA",
          "BUILD PROTOTYPE(FIRST, MAKE IT REAL THEN MAKE IT BEAUTIFUL)",
          "LAUNCH YOUR IDEA",
          "PROMOTE IT",
          "COLLECT FEEDBACK",
          "IMPROVE PRODUCT",
          "SCALE GRADUALLY"
        ],
        "CONTENT CREATION":[
          "CHOOSE YOUR NICHE",
          "STUDY SUCCESSFUL CREATORS",
          "START POSTING CONSISTENTLY",
          "IMPROVE STORYTELLING",
          "LEARN EDITING SKILLS",
          "BUILD YOUR STYLE",
          "ENGAGE WITH AUDIENCE",
          "COLLABORATE WITH CREATORS",
          "MONITIZE CONTENT",
          "GROW YOUR BRAND",
        ],
        "FINANCIAL WEALTH":[
          "UNDERSTAND MONEY PRINCIPLES",
          "TRACK SPENDING",
          "BUILD SAVINGS HABITS",
          "LEARN INVESTING BASICS",
          "AVOID BAD DEBT",
          "INCREASE INCOME SKILLS",
          "CREATE SIDE INCOME",
          "INVEST REGULARLY",
          "AIM FOR FINANCIAL INDEPENDENCE",
        ],
        "LEADERSHIP":[
          "IMPROVE COMMUNICATION",
          "DEVELOP EMOTIONAL INTELLIGENCE",
          "LISTEN CAREFULLY",
          "TAKE RESPONSIBILITY",
          "MAKE DECISIONS",
          "GUIDE TEAMS",
          "RESOLVE CONFLICTS",
          "INSPIRE PEOPLE",
          "BUILD TRUST",
          "CREATE IMPACT",
        ],
        "ACADEMIC EXCELLENCE":[
          "SET CLEAR STUDY GOALS",
          "CREATE STUDY SCHEDULE",
          "FOCUS DEEPLY",
          "REVIEW DAILY",
          "ASK QUESTIONS",
          "TEACH OTHERS",
          "DEVELOP CRITICAL THINKING",
          "STUDY BEYOND TEXTBOOKS",
          "PRACTICE EXAMS",
          "CONTINUE LIFELONG LEARNING",
        ],
        "PERSONAL MASTERY":[
          "UNDERSTAND YOURSELF",
          "BUILD HEALTHY HABITS",
          "CONTROL YOUR TIME",
          "EXERCISE DAILY",
          "MEDITATE",
          "SET GOALS",
          "TRACK PROGRESS",
          "STAY DESCIPLINED",
          "LIVE WITH PURPOSE",
        ],
      };
      const selector=document.getElementById("selector");
      const roadmap=document.getElementById("roadmap");
      const bar=document.getElementById("bar");
      const percent=document.getElementById("percent");

      Object.keys(paths).forEach(path=>{

         let div=document.createElement("div");
         div.className="option";
         div.innerText=path;

         div.onclick=()=>{
           startRoadmap(path);
         };

         selector.appendChild(div);

      });

       function startRoadmap(path){

         selector.style.opacity="0";

         setTimeout(()=>{
          selector.style.display="none";
          roadmap.style.display="block";
          loadSteps(paths[path]);
         },500);

       }

       function loadSteps(steps){

          roadmap.innerHTML="";

          steps.forEach(text=>{
          let div=document.createElement("div");
          div.className="step";
          div.innerText=text;
          roadmap.appendChild(div);
          observer.observe(div); 
          });

        }

        function reveal(){

           const steps=document.querySelectorAll(".step");

           let trigger=window.innerHeight*0.85;

           steps.forEach(step=>{
             let top=step.getBoundingClientRect().top;

             if(top<trigger){
               step.classList.add("show");
             }
           });

        }

        function progress(){

          let scrollTop=document.documentElement.scrollTop;
          let height=document.documentElement.scrollHeight-document.documentElement.clientHeight;

          let value=(scrollTop/height)*100;

          bar.style.width=value+"%";
          percent.innerText=Math.round(value)+"%";

         }

        window.addEventListener("scroll",()=>{
          reveal();
          progress();
        });
        const observer = new IntersectionObserver(entries=>{
         entries.forEach(entry=>{
            if(entry.isIntersecting){
              entry.target.classList.add("show");
             }else{
              entry.target.classList.remove("show");
            }
          });
        },{threshold:0.1});
          document.getElementById("selector").forEach(el=>{
             observer.observe(el);
           });  
    </script>
